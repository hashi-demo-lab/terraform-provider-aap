version: "2"
linters:
  default: none
  enable:
    - copyloopvar
    - depguard
    - dogsled
    - durationcheck
    - errcheck
    - forcetypeassert
    - gocheckcompilerdirectives
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - makezero
    - misspell
    - mnd
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - predeclared
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - usetesting
  settings:
    depguard:
      rules:
        prevent_unmaintained_packages:
          list-mode: lax
          deny:
            - pkg: "io/ioutil"
              desc: "io/ioutil package has been deprecated since Go 1.16, use io and os packages instead"
        prevent_sdk_v2:
          list-mode: lax
          files:
            - "!**/internal/**"
            - "!**/*_test.go"
          deny:
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2"
              desc: "Use terraform-plugin-framework or terraform-plugin-testing instead"
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2/helper/acctest"
              desc: "Use github.com/hashicorp/terraform-plugin-testing/helper/acctest instead"
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2/helper/resource"
              desc: "Use github.com/hashicorp/terraform-plugin-testing/helper/resource instead"
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2/helper/schema"
              desc: "Use terraform-plugin-framework instead"
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2/terraform"
              desc: "Use github.com/hashicorp/terraform-plugin-testing/terraform instead"
    goconst:
      min-len: 2
      min-occurrences: 3
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G402
    govet:
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
    lll:
      line-length: 160
    misspell:
      locale: US
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
    revive:
      rules:
        - name: unexported-return
          disabled: true
        - name: unused-parameter
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
    usetesting:
      os-temp-dir: true
      os-chdir: true
      context-background: true
      context-todo: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
