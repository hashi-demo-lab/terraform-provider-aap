# Fallback snapshot of the HashiCorp terraform-provider-scaffolding-framework
# golangci-lint config. Only used when the live fetch from GitHub fails.
#
# Source: https://github.com/hashicorp/terraform-provider-scaffolding-framework/blob/main/.golangci.yml
# Last updated: 2026-03-09
#
# To refresh this snapshot:
#   gh api repos/hashicorp/terraform-provider-scaffolding-framework/contents/.golangci.yml --jq '.content' | base64 -d

version: "2"
linters:
  default: none
  enable:
    - copyloopvar
    - depguard
    - durationcheck
    - errcheck
    - forcetypeassert
    - godot
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - predeclared
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usetesting
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2/helper/acctest"
              desc: "Use github.com/hashicorp/terraform-plugin-testing/helper/acctest"
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2/helper/resource"
              desc: "Use github.com/hashicorp/terraform-plugin-testing/helper/resource"
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2/terraform"
              desc: "Use github.com/hashicorp/terraform-plugin-testing/terraform"
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2"
              desc: "Use Terraform Plugin Framework"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
